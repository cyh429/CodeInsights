<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 840" width="1200" height="840">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8.5" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6f6256"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; letter-spacing: 0; }
      .title { font-size: 28px; font-weight: 800; fill: #1a1a1a; }
      .subtitle { font-size: 14px; font-weight: 600; fill: #8f8a80; }
      .section { font-size: 13px; font-weight: 800; fill: #8b7355; letter-spacing: 3px; }
      .node-type { font-size: 11px; font-weight: 800; fill: #9d9388; letter-spacing: 2.5px; }
      .node-title { font-weight: 800; fill: #1a1a1a; }
      .node-sub { font-size: 12px; font-weight: 650; fill: #6b6257; }
      .footnote { font-size: 12px; font-weight: 650; fill: #a29a8f; }
      .legend { font-size: 12px; font-weight: 750; fill: #6b6257; }
    </style>
  </defs>

<rect width="1200" height="840" fill="#f8f6f3"/>
<text x="48" y="48" text-anchor="start" class="title">Local Storage Framework</text>
<text x="48" y="75" text-anchor="start" class="subtitle">Portable JSON configuration, append-only JSONL records, runtime manifests, and repo-local patch-work evidence</text>
<line x1="48" y1="96" x2="1152" y2="96" stroke="#ded8cf" stroke-width="1.2"/>
<rect x="48" y="120" width="1104" height="118" rx="16" fill="none" stroke="#ded8cf" stroke-width="1.4" stroke-dasharray="6 6"/>
<rect x="48" y="285" width="1104" height="118" rx="16" fill="none" stroke="#ded8cf" stroke-width="1.4" stroke-dasharray="6 6"/>
<rect x="48" y="445" width="1104" height="118" rx="16" fill="none" stroke="#ded8cf" stroke-width="1.4" stroke-dasharray="6 6"/>
<rect x="48" y="620" width="1104" height="118" rx="16" fill="none" stroke="#ded8cf" stroke-width="1.4" stroke-dasharray="6 6"/>
<line x1="430" y1="199" x2="310" y2="199" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 200,240 L 200,275 L 190,316" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<path d="M 200,240 L 200,275 L 440,316" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<path d="M 200,240 L 200,275 L 700,316" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<path d="M 200,240 L 200,275 L 970,316" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<line x1="970" y1="393" x2="970" y2="476" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="545" y1="518" x2="585" y2="518" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="815" y1="518" x2="865" y2="518" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="190" y1="553" x2="210" y2="651" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<line x1="440" y1="553" x2="515" y2="651" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<line x1="700" y1="553" x2="790" y2="651" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<line x1="970" y1="553" x2="1030" y2="651" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<line x1="335" y1="693" x2="405" y2="693" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="68" y="154" text-anchor="start" class="section">CONFIG ROOT</text>
<text x="68" y="319" text-anchor="start" class="section">GLOBAL CONFIG FILES</text>
<text x="68" y="479" text-anchor="start" class="section">SESSION RECORDS</text>
<text x="68" y="654" text-anchor="start" class="section">WORKSPACE SNAPSHOTS</text>
<g id="root">
<rect x="90" y="158" width="220" height="82" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="200.0" y="180" text-anchor="middle" class="node-type">ROOT</text>
<text x="200.0" y="208" text-anchor="middle" class="node-title" style="font-size:17px">~/.codeinsights</text>
<text x="200.0" y="230" text-anchor="middle" class="node-sub" style="font-size:12px">dev / codeinsights-dev</text>
</g>
<g id="env">
<rect x="430" y="158" width="220" height="82" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="540.0" y="180" text-anchor="middle" class="node-type">ENV</text>
<text x="540.0" y="208" text-anchor="middle" class="node-title" style="font-size:17px">Config Override</text>
<text x="540.0" y="230" text-anchor="middle" class="node-sub" style="font-size:12px">CODEINSIGHTS_CONFIG_DIR</text>
</g>
<g id="nodb">
<rect x="760" y="158" width="220" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="870.0" y="180" text-anchor="middle" class="node-type">PRINCIPLE</text>
<text x="870.0" y="208" text-anchor="middle" class="node-title" style="font-size:17px">No Local DB</text>
<text x="870.0" y="230" text-anchor="middle" class="node-sub" style="font-size:12px">portable files</text>
</g>
<g id="providers">
<rect x="85" y="323" width="210" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="190.0" y="341" text-anchor="middle" class="node-type">CONFIG</text>
<text x="190.0" y="366" text-anchor="middle" class="node-title" style="font-size:17px">Providers + Secrets</text>
<text x="190.0" y="383" text-anchor="middle" class="node-sub" style="font-size:12px">channels.json + safeStorage</text>
</g>
<g id="settings">
<rect x="335" y="323" width="210" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="440.0" y="341" text-anchor="middle" class="node-type">CONFIG</text>
<text x="440.0" y="366" text-anchor="middle" class="node-title" style="font-size:17px">App Settings</text>
<text x="440.0" y="383" text-anchor="middle" class="node-sub" style="font-size:12px">settings / profile / proxy</text>
</g>
<g id="prompts">
<rect x="585" y="323" width="230" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="700.0" y="341" text-anchor="middle" class="node-type">CONFIG</text>
<text x="700.0" y="366" text-anchor="middle" class="node-title" style="font-size:17px">Prompts + Memory</text>
<text x="700.0" y="383" text-anchor="middle" class="node-sub" style="font-size:12px">system prompts / tools</text>
</g>
<g id="skills">
<rect x="865" y="323" width="210" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="970.0" y="341" text-anchor="middle" class="node-type">SKILLS</text>
<text x="970.0" y="366" text-anchor="middle" class="node-title" style="font-size:17px">Default Skills</text>
<text x="970.0" y="383" text-anchor="middle" class="node-sub" style="font-size:12px">workspace templates</text>
</g>
<g id="chat">
<rect x="85" y="483" width="210" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="190.0" y="501" text-anchor="middle" class="node-type">JSONL</text>
<text x="190.0" y="526" text-anchor="middle" class="node-title" style="font-size:17px">Chat Records</text>
<text x="190.0" y="543" text-anchor="middle" class="node-sub" style="font-size:12px">conversations + attachments</text>
</g>
<g id="agent">
<rect x="335" y="483" width="210" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="440.0" y="501" text-anchor="middle" class="node-type">JSONL</text>
<text x="440.0" y="526" text-anchor="middle" class="node-title" style="font-size:17px">Agent Records</text>
<text x="440.0" y="543" text-anchor="middle" class="node-sub" style="font-size:12px">messages + events</text>
</g>
<g id="pipeline">
<rect x="585" y="483" width="230" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="700.0" y="501" text-anchor="middle" class="node-type">JSONL</text>
<text x="700.0" y="526" text-anchor="middle" class="node-title" style="font-size:17px">Pipeline State</text>
<text x="700.0" y="543" text-anchor="middle" class="node-sub" style="font-size:12px">records + checkpoints</text>
</g>
<g id="tasks">
<rect x="865" y="483" width="210" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="970.0" y="501" text-anchor="middle" class="node-type">TASKS</text>
<text x="970.0" y="526" text-anchor="middle" class="node-title" style="font-size:17px">Contribution Tasks</text>
<text x="970.0" y="543" text-anchor="middle" class="node-sub" style="font-size:12px">index + event JSONL</text>
</g>
<g id="workspace">
<rect x="85" y="658" width="250" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="210.0" y="676" text-anchor="middle" class="node-type">LOCAL CWD</text>
<text x="210.0" y="701" text-anchor="middle" class="node-title" style="font-size:17px">agent-workspaces/{slug}</text>
<text x="210.0" y="718" text-anchor="middle" class="node-sub" style="font-size:12px">mcp + skills + workspace-files</text>
</g>
<g id="cwd">
<rect x="405" y="658" width="220" height="70" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="515.0" y="676" text-anchor="middle" class="node-type">SNAPSHOT</text>
<text x="515.0" y="701" text-anchor="middle" class="node-title" style="font-size:17px">sessions/{id}/cwd</text>
<text x="515.0" y="718" text-anchor="middle" class="node-sub" style="font-size:12px">runtime-manifest.json</text>
</g>
<g id="artifacts">
<rect x="685" y="658" width="210" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="790.0" y="676" text-anchor="middle" class="node-type">ARTIFACTS</text>
<text x="790.0" y="701" text-anchor="middle" class="node-title" style="font-size:17px">Pipeline Artifacts</text>
<text x="790.0" y="718" text-anchor="middle" class="node-sub" style="font-size:12px">session output folders</text>
</g>
<g id="patch">
<rect x="945" y="658" width="170" height="70" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="1030.0" y="676" text-anchor="middle" class="node-type">REPO</text>
<text x="1030.0" y="701" text-anchor="middle" class="node-title" style="font-size:17px">./patch-work</text>
<text x="1030.0" y="718" text-anchor="middle" class="node-sub" style="font-size:12px">repo evidence docs</text>
</g>
<g id="legend">
<rect x="912" y="736" width="220" height="64" rx="10" fill="#fffaf3" opacity="0.96"/>
<line x1="930" y1="758" x2="968" y2="758" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="984" y="763" text-anchor="start" class="legend">primary path</text>
<line x1="930" y1="782" x2="968" y2="782" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<text x="984" y="787" text-anchor="start" class="legend">async / persisted state</text>
</g>
<text x="48" y="812" text-anchor="start" class="footnote">Pipeline patch-work lives in the contribution repository; application state lives under the selected CodeInsights config root.</text>
</svg>
