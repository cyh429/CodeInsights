<rect x="48" y="470" width="1104" height="128" rx="16" fill="none" stroke="#ded8cf" stroke-width="1.4" stroke-dasharray="6 6"/>
<rect x="48" y="650" width="1104" height="116" rx="16" fill="none" stroke="#ded8cf" stroke-width="1.4" stroke-dasharray="6 6"/>
<line x1="235" y1="201" x2="285" y2="201" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="435" y1="201" x2="485" y2="201" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
