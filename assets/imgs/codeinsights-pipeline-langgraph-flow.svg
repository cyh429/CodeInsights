<line x1="835" y1="201" x2="885" y2="201" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 960,242 L 960,270 L 200,270 L 200,328" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="280" y1="376" x2="350" y2="376" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="510" y1="376" x2="590" y2="376" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="750" y1="376" x2="830" y2="376" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 910,417 L 910,445 L 165,445 L 165,503" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="240" y1="551" x2="310" y2="551" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="460" y1="551" x2="530" y2="551" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="690" y1="551" x2="760" y2="551" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="920" y1="551" x2="980" y2="551" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 670,417 L 670,442 L 105,442 L 105,376 L 113,376" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<line x1="165" y1="592" x2="180" y2="683" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<line x1="610" y1="592" x2="720" y2="683" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<line x1="840" y1="592" x2="990" y2="683" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<text x="68" y="154" text-anchor="start" class="section">DISCOVERY + PLAN</text>
<text x="68" y="329" text-anchor="start" class="section">IMPLEMENTATION + REVIEW</text>
<text x="68" y="504" text-anchor="start" class="section">VALIDATION + SUBMISSION</text>
<text x="68" y="684" text-anchor="start" class="section">EVIDENCE + RECOVERY</text>
<g id="goal">
<rect x="85" y="160" width="150" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="160.0" y="182" text-anchor="middle" class="node-type">INPUT</text>
<text x="160.0" y="210" text-anchor="middle" class="node-title" style="font-size:17px">User Goal</text>
<text x="160.0" y="232" text-anchor="middle" class="node-sub" style="font-size:12px">contribution</text>
</g>
<g id="explorer">
<rect x="285" y="160" width="150" height="82" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="360.0" y="182" text-anchor="middle" class="node-type">CLAUDE</text>
<text x="360.0" y="210" text-anchor="middle" class="node-title" style="font-size:17px">Explorer</text>
<text x="360.0" y="232" text-anchor="middle" class="node-sub" style="font-size:12px">repo scan</text>
</g>
<g id="taskgate">
<rect x="485" y="160" width="150" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="560.0" y="182" text-anchor="middle" class="node-type">HUMAN</text>
<text x="560.0" y="210" text-anchor="middle" class="node-title" style="font-size:17px">Task Gate</text>
<text x="560.0" y="232" text-anchor="middle" class="node-sub" style="font-size:12px">task selection</text>
</g>
<g id="planner">
<rect x="685" y="160" width="150" height="82" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="760.0" y="182" text-anchor="middle" class="node-type">CLAUDE</text>
<text x="760.0" y="210" text-anchor="middle" class="node-title" style="font-size:17px">Planner</text>
<text x="760.0" y="232" text-anchor="middle" class="node-sub" style="font-size:12px">plan + risks</text>
</g>
<g id="plangate">
<rect x="885" y="160" width="150" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="960.0" y="182" text-anchor="middle" class="node-type">HUMAN</text>
<text x="960.0" y="210" text-anchor="middle" class="node-title" style="font-size:17px">Plan Gate</text>
<text x="960.0" y="232" text-anchor="middle" class="node-sub" style="font-size:12px">document review</text>
</g>
<g id="developer">
<rect x="120" y="335" width="160" height="82" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="200.0" y="357" text-anchor="middle" class="node-type">CODEX</text>
<text x="200.0" y="385" text-anchor="middle" class="node-title" style="font-size:17px">Developer</text>
<text x="200.0" y="407" text-anchor="middle" class="node-sub" style="font-size:12px">workspace-write</text>
</g>
<g id="devgate">
<rect x="350" y="335" width="160" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="430.0" y="357" text-anchor="middle" class="node-type">HUMAN</text>
<text x="430.0" y="385" text-anchor="middle" class="node-title" style="font-size:17px">Dev Gate</text>
<text x="430.0" y="407" text-anchor="middle" class="node-sub" style="font-size:12px">document review</text>
</g>
<g id="reviewer">
<rect x="590" y="335" width="160" height="82" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="670.0" y="357" text-anchor="middle" class="node-type">CODEX</text>
<text x="670.0" y="385" text-anchor="middle" class="node-title" style="font-size:17px">Reviewer</text>
<text x="670.0" y="407" text-anchor="middle" class="node-sub" style="font-size:12px">read-only audit</text>
</g>
<g id="reviewgate">
<rect x="830" y="335" width="160" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="910.0" y="357" text-anchor="middle" class="node-type">HUMAN</text>
<text x="910.0" y="385" text-anchor="middle" class="node-title" style="font-size:17px">Review Gate</text>
<text x="910.0" y="407" text-anchor="middle" class="node-sub" style="font-size:12px">after 3 failures</text>
</g>
<g id="tester">
<rect x="90" y="510" width="150" height="82" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="165.0" y="532" text-anchor="middle" class="node-type">CODEX</text>
<text x="165.0" y="560" text-anchor="middle" class="node-title" style="font-size:17px">Tester</text>
<text x="165.0" y="582" text-anchor="middle" class="node-sub" style="font-size:12px">test evidence</text>
</g>
<g id="testgate">
<rect x="310" y="510" width="150" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="385.0" y="532" text-anchor="middle" class="node-type">HUMAN</text>
<text x="385.0" y="560" text-anchor="middle" class="node-title" style="font-size:17px">Test Gate</text>
<text x="385.0" y="582" text-anchor="middle" class="node-sub" style="font-size:12px">blocked risk</text>
</g>
<g id="committer">
<rect x="530" y="510" width="160" height="82" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="610.0" y="532" text-anchor="middle" class="node-type">CODEX</text>
<text x="610.0" y="560" text-anchor="middle" class="node-title" style="font-size:17px">Committer</text>
<text x="610.0" y="582" text-anchor="middle" class="node-sub" style="font-size:12px">commit + PR draft</text>
</g>
<g id="submitgate">
<rect x="760" y="510" width="160" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="840.0" y="532" text-anchor="middle" class="node-type">HUMAN</text>
<text x="840.0" y="560" text-anchor="middle" class="node-title" style="font-size:17px">Submit Gate</text>
<text x="840.0" y="582" text-anchor="middle" class="node-sub" style="font-size:12px">submission review</text>
</g>
<g id="done">
<rect x="980" y="510" width="140" height="82" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="1050.0" y="532" text-anchor="middle" class="node-type">STATE</text>
<text x="1050.0" y="560" text-anchor="middle" class="node-title" style="font-size:17px">Done</text>
<text x="1050.0" y="582" text-anchor="middle" class="node-sub" style="font-size:12px">completed</text>
</g>
<g id="patchwork">
<rect x="85" y="690" width="190" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="180.0" y="708" text-anchor="middle" class="node-type">REPO</text>
<text x="180.0" y="733" text-anchor="middle" class="node-title" style="font-size:17px">./patch-work</text>
<text x="180.0" y="750" text-anchor="middle" class="node-sub" style="font-size:10.5px">plan / dev / review / result</text>
</g>
<g id="checkpoints">
<rect x="355" y="690" width="190" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="450.0" y="708" text-anchor="middle" class="node-type">RECOVERY</text>
<text x="450.0" y="733" text-anchor="middle" class="node-title" style="font-size:17px">Checkpoints</text>
<text x="450.0" y="750" text-anchor="middle" class="node-sub" style="font-size:12px">MemorySaver on disk</text>
</g>
<g id="records">
<rect x="625" y="690" width="190" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="720.0" y="708" text-anchor="middle" class="node-type">AUDIT</text>
<text x="720.0" y="733" text-anchor="middle" class="node-title" style="font-size:17px">Pipeline Records</text>
<text x="720.0" y="750" text-anchor="middle" class="node-sub" style="font-size:12px">JSONL stream history</text>
</g>
<g id="remote">
<rect x="895" y="690" width="190" height="70" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.3"/>
<text x="990.0" y="708" text-anchor="middle" class="node-type">GUARD</text>
<text x="990.0" y="733" text-anchor="middle" class="node-title" style="font-size:17px">Remote Write</text>
<text x="990.0" y="750" text-anchor="middle" class="node-sub" style="font-size:12px">confirm push / PR</text>
</g>
<g id="legend">
<rect x="912" y="796" width="220" height="64" rx="10" fill="#fffaf3" opacity="40.96"/>
<line x1="930" y1="778" x2="968" y2="778" fill="none" stroke="#6f6256" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="984" y="823" text-anchor="start" class="legend">primary path</text>
<line x1="930" y1="802" x2="968" y2="802" fill="none" stroke="#6f6256" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<text x="984" y="847" text-anchor="start" class="legend">async / persisted state</text>
</g>
<text x="48" y="872" text-anchor="start" class="footnote">v2 default adds Developer gate and Committer stage; v1 compatibility remains for old sessions.</text>
</svg>
