<text x="68" y="154" text-anchor="start" class="section">RENDERER ENTRY</text>
<text x="68" y="329" text-anchor="start" class="section">ORCHESTRATION</text>
<text x="68" y="504" text-anchor="start" class="section">CODING RUNTIMES</text>
<text x="68" y="684" text-anchor="start" class="section">INTERACTION + PERSISTENCE</text>
<g id="agentview">
<rect x="85" y="160" width="190" height="82" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.3"/>
